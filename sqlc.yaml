version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/repository/queries"
    schema: "migrations"
    gen:
      go:
        package: "repository"
        out: "internal/repository"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true
          - db_type: "text"
            nullable: true
            go_type:
              type: "string"
              pointer: true
          - db_type: "int4"
            nullable: true
            go_type:
              type: "int32"
              pointer: true
          - db_type: "integer"
            nullable: true
            go_type:
              type: "int32"
              pointer: true
          - db_type: "pg_catalog.int4"
            nullable: true
            go_type:
              type: "int32"
              pointer: true
          - db_type: "date"
            go_type:
              import: "time"
              type: "Time"
          - db_type: "time"
            go_type:
              import: "time"
              type: "Time"
          - db_type: "time without time zone"
            go_type:
              import: "time"
              type: "Time"
          - db_type: "pg_catalog.time"
            go_type:
              import: "time"
              type: "Time"
          - db_type: "jsonb"
            go_type: "encoding/json.RawMessage"
